<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 15px; line-height: 1.6; color: #1E293B; padding: 16px; background: transparent; }
        h1 { font-size: 26px; font-weight: bold; margin-bottom: 8px; color: #1E293B; }
        h2 { font-size: 22px; font-weight: bold; margin-bottom: 6px; color: #334155; }
        h3 { font-size: 18px; font-weight: bold; margin-bottom: 4px; color: #475569; }
        p { margin-bottom: 10px; }
        strong { font-weight: bold; }
        em { font-style: italic; }
        a { color: #DD042B; }
        ul, ol { margin: 8px 0; padding-left: 24px; }
        li { margin-bottom: 4px; }
        blockquote { border-left: 4px solid #D97706; background: #FEF3C7; padding: 10px 16px; margin: 8px 0; color: #92400E; }
        pre { background: #F1F5F9; padding: 12px; border-radius: 6px; font-family: Consolas, monospace; font-size: 13px; overflow-x: auto; }
        code { background: #F1F5F9; padding: 2px 6px; border-radius: 3px; font-family: Consolas, monospace; font-size: 13px; }
        table { border-collapse: collapse; width: 100%; margin: 8px 0; }
        th { background: #F1F5F9; font-weight: bold; text-align: left; }
        th, td { border: 1px solid #E2E8F0; padding: 8px; }
        hr { border: none; border-top: 1px solid #E2E8F0; margin: 16px 0; }
        html { overflow: hidden; }
        body { overflow-y: auto; scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="content"></div>
<script>
    function updateHeight() {
        // Use body scrollHeight for accurate measurement
        var height = Math.max(
            document.body.scrollHeight,
            document.getElementById('content').scrollHeight
        ) + 50;
        window.location = 'invoke://resize/' + height;
    }

    function setHtmlBase64(b64) {
        const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        document.getElementById('content').innerHTML = new TextDecoder().decode(bytes);
        // Delay to let browser calculate layout
        setTimeout(updateHeight, 100);
    }

    function setHtml(html) {
        document.getElementById('content').innerHTML = html;
        setTimeout(updateHeight, 100);
    }
</script>
</body>
</html>
